let current=null;

function render(filter='all'){
  const g=document.getElementById('grid');
  const list=filter==='all'?T:T.filter(t=>t.cat===filter);
  g.innerHTML=list.map(t=>`
    <div class="template-card" onclick="open(${t.id})">
      <div class="card-header">
        <div class="card-icon">${t.icon}</div>
        <div>
          <div class="card-type">${t.type}</div>
          <div class="card-title">${t.title}</div>
          <div class="card-subtitle">${t.sub}</div>
        </div>
      </div>
      <div class="card-body">
        <p class="card-desc">${t.desc}</p>
        <div class="card-tags">${t.tags.map(tg=>`<span class="tag ${tg.c||''}">${tg.l}</span>`).join('')}</div>
      </div>
      <div class="card-footer">
        <span class="card-law">${t.law}</span>
        <button class="btn-view">查看範本 →</button>
      </div>
    </div>`).join('');
}

function filterCards(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(cat);
}

function open(id){
  current=T.find(t=>t.id===id);
  if(!current)return;
  document.getElementById('mTitle').textContent=current.title;
  document.getElementById('mBody').innerHTML=`
    <div class="modal-section"><h3>📋 適用情境</h3><p>${current.desc}</p></div>
    <div class="modal-section"><h3>⚖️ 相關法條</h3><p>${current.law}</p></div>
    <div class="modal-section"><h3>📄 合約範本</h3><pre id="tContent">${current.content}</pre></div>`;
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('overlay').classList.remove('active');document.body.style.overflow='';}

function copyTpl(){
  if(!current)return;
  navigator.clipboard.writeText(current.content).then(()=>{
    const b=document.querySelector('.btn-copy');
    b.textContent='✓ 已複製到剪貼簿';
    setTimeout(()=>b.textContent='📋 複製合約文字',2000);
  });
}

render();
